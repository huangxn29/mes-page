name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, master, release/*, hotfix/*]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Check
        run: |
          echo "Lint check passed (placeholder)"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Check
        run: |
          echo "Build check passed (placeholder)"
